<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>unravel-nl wasm browser smoke</title>
  </head>
  <body>
    <pre id="status">pending</pre>
    <script type="module">
      import init, {
        parse_dimensions_for_editor_json_with_context,
        parse_json,
        parse_json_with_context,
        parse_json_with_locale,
      } from "../pkg/unravel_nl.js";

      const status = document.getElementById("status");

      try {
        await init();
        const length = JSON.parse(parse_json_with_locale("5尺3寸", "ja"));
        const room = JSON.parse(
          parse_dimensions_for_editor_json_with_context("3m×4m のLDK", "ja", "", ""),
        );
        const plainLength = JSON.parse(
          parse_dimensions_for_editor_json_with_context("寸法3640", "ja", "length", ""),
        );
        const editorDimensions = JSON.parse(
          parse_dimensions_for_editor_json_with_context(
            "幅3m×奥行4m、予算1234、next friday、6帖、寸法3640",
            "ja",
            "",
            "",
          ),
        );
        const strictApproximation = JSON.parse(
          parse_json_with_context("約3m", "ja", "length", "strict"),
        );
        const recurrence = JSON.parse(parse_json("every third business day"));
        const failure = JSON.parse(
          parse_json_with_context("3pm Europe/Paris", "", "time", ""),
        );

        if (length.best.unit !== "m" || length.best.dimension !== "length") {
          throw new Error("length parse failed");
        }
        if (room.length !== 2 || room[0].text !== "3m" || room[1].text !== "4m") {
          throw new Error("room dimension scan failed");
        }
        if (
          plainLength.length !== 1 ||
          plainLength[0].parsed.issues[0].code !== "UNIT_ASSUMED"
        ) {
          throw new Error("unitless length context failed");
        }
        if (
          editorDimensions.length !== 4 ||
          editorDimensions.map((match) => match.text).join(",") !== "3m,4m,6帖,3640"
        ) {
          throw new Error("editor dimension scan failed");
        }
        if (strictApproximation.issues[0].code !== "APPROXIMATION") {
          throw new Error("strict approximation issue missing");
        }
        // No recurrence surface: the phrase is refused, not canonicalized.
        if (recurrence.best !== null || recurrence.issues[0].code !== "NO_VALUE") {
          throw new Error("recurrence phrase was not refused loudly");
        }
        if (failure.issues[0].code !== "TIMEZONE_UNSUPPORTED") {
          throw new Error("timezone failure metadata missing");
        }

        status.textContent = JSON.stringify({
          ok: true,
          length: length.best,
          room,
          plainLength,
          editorDimensions,
          strictApproximation,
          recurrence: recurrence.issues[0],
          issue: failure.issues[0],
        });
      } catch (error) {
        status.textContent = JSON.stringify({
          ok: false,
          message: error instanceof Error ? error.message : String(error),
        });
      }
    </script>
  </body>
</html>
